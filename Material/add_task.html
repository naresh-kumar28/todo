<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased min-h-screen">

    <nav class="sticky top-0 z-50 backdrop-blur-lg bg-white/80 border-b border-gray-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Logo & Nav Links Container -->
          <div class="flex items-center gap-8">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
              <a href="" class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 tracking-tight">Todo App</a>
            </div>
          </div>

          <!-- Add Task Button -->
          <div class="flex items-center">
            <a href="" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium">Add Task</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="flex-1 w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <!-- Form Card Container -->
      <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8 sm:p-10">
        <div class="mb-8">
          <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Add Task</h2>
          <p class="text-gray-500 mt-2 text-sm">Create a new item for your workflow.</p>
        </div>

        <form class="space-y-6" action="" method="POST">
          <div>
            <div class="mb-5">
              <label for="title" class="block text-sm font-medium text-gray-700 mb-1.5">Title</label>
              <input type="text" id="title" name="title" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 bg-white text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 shadow-sm" placeholder="Enter task title" required />
            </div>

            <div class="mb-5">
              <label for="description" class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
              <textarea id="description" name="description" rows="4" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 bg-white text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 shadow-sm" placeholder="Enter task description"></textarea>
            </div>

            <div class="flex items-center">
              <input type="checkbox" id="completed" name="completed" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer transition-all duration-200" />
              <label for="completed" class="ml-2 text-sm font-medium text-gray-700 cursor-pointer">Mark as completed</label>
            </div>
          </div>

          <div class="pt-4 flex items-center gap-4">
            <button type="submit" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-3 rounded-xl text-sm font-semibold shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 transition-all duration-200">Save</button>

            <a href="" type="button" class="bg-white border border-gray-200 text-gray-700 px-8 py-3 rounded-xl text-sm font-semibold shadow-sm hover:bg-gray-50 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200">Cancel</a>
          </div>
        </form>
      </div>
    </main>
    
  </body>
</html>
