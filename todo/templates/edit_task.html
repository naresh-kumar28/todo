{% extends "base.html" %}
{% load tailwind_filters %}
<title>{% block title %}Edit Tasks - Premium Todo App{% endblock %}</title>

{% block content %}

<main class="flex-1 w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

  <!-- Form Card Container -->
  <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8 sm:p-10">
    <div class="mb-8">
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Edit Task</h2>
      <p class="text-gray-500 mt-2 text-sm">Update the details for this specific task.</p>
    </div>

    <form class="space-y-6" action="" method="POST">
      {% csrf_token %}

      <div>
        {{form | crispy}}
      </div>

      <div class="pt-4 flex items-center gap-4">
        <button type="submit"
          class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-3 rounded-xl text-sm font-semibold shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 transition-all duration-200">Save</button>

        <a href="" type="button"
          class="bg-white border border-gray-200 text-gray-700 px-8 py-3 rounded-xl text-sm font-semibold shadow-sm hover:bg-gray-50 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200">Cancel</a>
      </div>
    </form>
    
  </div>
</main>

{% endblock %}
